name: ScamShield AI CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-run-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgomp1

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with Flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings.
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Dry Run Inference test
        run: |
          # Basic python test to ensure paths and imports are correct
          PYTHONPATH=. python -c "from ml.pipelines.inference import ScamShieldInference; print('Inference import test successful')"

  docker-dry-run-build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: orgs/setup-buildx-action@v2

      - name: Build Backend Docker Image (Dry Run)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: scamshield-backend:latest

      - name: Build Frontend Docker Image (Dry Run)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          tags: scamshield-frontend:latest
